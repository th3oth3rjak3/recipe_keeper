name: Release

on:
  push:
    tags:
      - "v*" # Runs when a tag starting with "v" is pushed

jobs:
  build:
    runs-on: ubuntu-24.04 # Explicitly use Ubuntu 24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y libsqlite3-dev zip  # Install zip utility

      - name: Set Up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install Node.js Dependencies
        run: npm install
        working-directory: ./client # Ensure we are installing dependencies in the client folder

      - name: Build Rust and Frontend
        run: cargo build --release
        working-directory: ./ # Ensure we are building the Rust project from the root directory

      - name: Debug Build Output
        run: |
          # List the contents of the target release folder to check if the binary exists
          ls -lah target/release/

      - name: Prepare Binary for Zipping
        run: |
          # Create a temporary folder for the binary
          mkdir -p temp_release
          cp target/release/recipe_keeper temp_release/recipe_keeper

      - name: Zip the Binary
        run: |
          # Zip the binary with the desired name
          ZIP_NAME="recipe_keeper-ubuntu-24.04-x86_64"
          zip -j "release/$ZIP_NAME.zip" temp_release/recipe_keeper
          echo "Zipped binary: release/$ZIP_NAME.zip"

      - name: Upload Zipped Binary
        uses: actions/upload-artifact@v4
        with:
          name: release-binary
          path: release/recipe_keeper-ubuntu-24.04-x86_64.zip  # Upload the zipped binary

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/recipe_keeper-ubuntu-24.04-x86_64.zip  # Include the zipped binary in the release
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}