name: Release

on:
  push:
    tags:
      - "v*" # Runs when a tag starting with "v" is pushed

jobs:
  build:
    runs-on: ubuntu-24.04 # Explicitly use Ubuntu 24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y libsqlite3-dev  # Only install libsqlite3-dev

      - name: Set Up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install Node.js Dependencies
        run: npm install
        working-directory: ./client # Ensure we are installing dependencies in the client folder

      - name: Build Rust and Frontend
        run: cargo build --release
        working-directory: ./ # Ensure we are building the Rust project from the root directory

      - name: Debug Build Output
        run: |
          # List the contents of the target release folder to check if the binary exists
          ls -lah target/release/

      - name: Create Platform Folder
        run: |
          # Hard-code the platform folder path
          PLATFORM="ubuntu-24.04-x86_64"
          echo "Creating platform folder: release/$PLATFORM"
          mkdir -p "release/$PLATFORM"

      - name: Move Binary to Platform Folder
        run: |
          # Hard-code the platform folder path
          PLATFORM="ubuntu-24.04-x86_64"
          echo "Copying binary to release/$PLATFORM/recipe_keeper"
          cp target/release/recipe_keeper "release/$PLATFORM/recipe_keeper"

      - name: Verify Platform Folder Contents
        run: |
          # Hard-code the platform folder path
          PLATFORM="ubuntu-24.04-x86_64"
          echo "Verifying contents of release/$PLATFORM"
          ls -lah "release/$PLATFORM"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: recipe_keeper
          path: release/ubuntu-24.04-x86_64/  # Upload the entire folder

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/ubuntu-24.04-x86_64/**/*  # Include all files in the folder
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}